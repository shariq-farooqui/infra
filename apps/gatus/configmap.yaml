apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: gatus
data:
  config.yaml: |-
    web:
      port: 8080
    metrics: true
    storage:
      type: sqlite
      path: /data/gatus.db
    ui:
      title: Homelab Status
      header: Homelab Status
      dark-mode: true
    endpoints:
      # External probe: hits farooqui.ai the same way a browser would,
      # through Cloudflare and the origin's AOP-gated TLS.
      - name: personal-site
        group: public
        url: https://farooqui.ai
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1000"
      # In-cluster probe of the Kubernetes API. insecure:true because
      # gatus has no reason to carry the cluster CA.
      - name: kubernetes-api
        group: cluster
        url: https://kubernetes.default.svc:443/healthz
        interval: 60s
        client:
          insecure: true
        conditions:
          - "[STATUS] == 200"
      - name: traefik
        group: cluster
        url: http://traefik.traefik.svc.cluster.local:8080/ping
        interval: 60s
        conditions:
          - "[STATUS] == 200"
