apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: gatus
data:
  config.yaml: |-
    web:
      port: 8080
    metrics: true
    storage:
      type: sqlite
      path: /data/gatus.db
    ui:
      title: Homelab Status
      header: Homelab Status
      dark-mode: true
    endpoints:
      # The one signal visitors care about: can they reach the site? Probes
      # farooqui.ai the same way a browser would, through Cloudflare.
      - name: personal-site
        group: public
        url: https://farooqui.ai
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1000"
