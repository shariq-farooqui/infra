apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      # User accounts, chat history, uploaded image attachments. SQLite
      # lives here too; 10 Gi is generous for personal use.
      storage: 10Gi
