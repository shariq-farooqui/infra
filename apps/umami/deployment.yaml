apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami
  namespace: umami
  labels:
    app.kubernetes.io/name: umami
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: umami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: umami
    spec:
      containers:
        - name: umami
          image: docker.io/umamisoftware/umami:3.1.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DATABASE_TYPE
              value: postgresql
            # $(VAR) is k8s env-var interpolation: POSTGRES_PASSWORD is
            # pulled from the secret, then baked into DATABASE_URL at
            # pod start. Keeps the password out of the static manifest.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: umami
                  key: db-password
            - name: DATABASE_URL
              value: postgresql://umami:$(POSTGRES_PASSWORD)@postgres.postgres.svc.cluster.local:5432/umami
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: umami
                  key: app-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/heartbeat
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/heartbeat
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
