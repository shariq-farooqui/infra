---
# Weekly PRs bumping pinned GitHub Actions, grouped so one diff covers all
# action updates at once rather than one PR per action.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
