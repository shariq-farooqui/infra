---
# Hooks run locally after `pre-commit install --install-hooks` and again in CI.
# Each hook's `rev` pins the exact version so local and CI behave identically.

# `pre-commit install` wires only the pre-commit git hook by default. The
# commit-msg hook is also required for the conventional-commits check below;
# declaring both here means a plain `pre-commit install` wires both, no
# `--hook-type commit-msg` flag needed.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # General file hygiene: whitespace, final newlines, basic structural checks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # YAML style and consistency. Rule overrides live in .yamllint.yaml.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  # Secret scanner: fails the commit if the diff looks like it contains
  # API keys, tokens, private keys, cloud credentials, etc.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # GitHub Actions workflow linter: schema validation, expression syntax,
  # and shellcheck applied to every `run:` step.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Commit-message linter: enforces Conventional Commits
  # (feat, fix, docs, chore, ci, ...). Runs on commit-msg, not pre-commit.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
